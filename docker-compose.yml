# =====================================================
# DOCKER-COMPOSE - Entorno Completo
# =====================================================

version: '3.8'

services:
  # =====================================================
  # BASE DE DATOS POSTGRESQL
  # =====================================================
  postgres:
    image: postgres:15-alpine
    container_name: telconova-postgres
    environment:
      POSTGRES_DB: telconova_db
      POSTGRES_USER: telconova_app
      POSTGRES_PASSWORD: TelcoN0v4_2025!
      PGTZ: America/Bogota
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/database:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - telconova-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telconova_app -d telconova_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # APLICACIÓN SPRING BOOT
  # =====================================================
#  app:
#    build:
#      context: .
 #     dockerfile: Dockerfile
  #  container_name: telconova-app
   # environment:
    #  SPRING_PROFILES_ACTIVE: prod
     # DB_HOST: postgres
    #  DB_PORT: 5432
     # DB_NAME: telconova_db
     # DB_USER: telconova_app
     # DB_PASSWORD: TelcoN0v4_2025!
     # JWT_SECRET: TelcoNova2025_SupportSuite_SecretKey_MuySeguro_NoCompartir_123456
     # JWT_EXPIRATION: 86400000
     # STORAGE_TYPE: local
     # LOCAL_UPLOAD_DIR: /app/uploads
     # CORS_ORIGINS: http://localhost:3000,http://localhost:4200,https://app.telconova.com
   # volumes:
   #   - app_uploads:/app/uploads
   #   - app_logs:/app/logs
   # ports:
   #   - "8080:8080"
   # networks:
   #   - telconova-network
   # depends_on:
   #   postgres:
   #     condition: service_healthy
   # restart: unless-stopped
   # healthcheck:
   #   test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
   #   interval: 30s
   #   timeout: 10s
   #   retries: 3
   #   start_period: 60s

  # =====================================================
  # PROMETHEUS (MÉTRICAS)
  # =====================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: telconova-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - telconova-network
    restart: unless-stopped

  # =====================================================
  # GRAFANA (VISUALIZACIÓN)
  # =====================================================
  grafana:
    image: grafana/grafana:10.1.0
    container_name: telconova-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: TelcoNova2025!
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    networks:
      - telconova-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # =====================================================
  # REDIS (CACHE)
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: telconova-redis
    command: redis-server --appendonly yes --requirepass TelcoNova2025!
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - telconova-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

# =====================================================
# VOLÚMENES PERSISTENTES
# =====================================================
volumes:
  postgres_data:
    driver: local
  app_uploads:
    driver: local
  app_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local

# =====================================================
# REDES
# =====================================================
networks:
  telconova-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16