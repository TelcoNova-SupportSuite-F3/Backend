# Información del proyecto
sonar.projectKey=AndresT3086_BackendTelconova
sonar.organization=AndresT3086
sonar.projectName=TelcoNova Support Suite
sonar.projectVersion=1.0.0

# Rutas del código fuente y tests
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Exclusiones (archivos que no quieres analizar)
sonar.exclusions=\
    **/config/**,\
    **/dto/**,\
    **/entidades/**,\
    **/excepciones/**,\
    **/*Application.java,\
    **/valueobjects/**

sonar.test.exclusions=\
    **/test/**

# Coverage
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.java.coveragePlugin=jacoco

# Configuración de lenguaje
sonar.language=java
sonar.java.source=21
sonar.sourceEncoding=UTF-8

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Umbrales de calidad (Quality Gate personalizado)
# Coverage mínimo: 40%
sonar.coverage.minimum=40.0

# Code Smells - Maintainability Rating debe ser C o mejor (40%)
# A = 0-0.05, B = 0.06-0.1, C = 0.11-0.2, D = 0.21-0.5, E = >0.5
sonar.sqale.rating.threshold=3.0