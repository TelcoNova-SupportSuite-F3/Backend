# =====================================================
# CONFIGURACIÓN DE PRODUCCIÓN
# =====================================================

server:
  port: 8080
  tomcat:
    max-threads: 200
    min-spare-threads: 20

spring:
  # Base de datos de producción
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${DB_NAME}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
        generate_statistics: false
        jdbc:
          batch_size: 50

  # Configuración de archivos para producción
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Logging optimizado para producción
logging:
  level:
    root: WARN
    com.telconova: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: /var/log/telconova/supportsuite.log
    max-size: 100MB
    max-history: 30

# Seguridad reforzada para producción
security:
  jwt:
    secret-key: ${JWT_SECRET}
    expiration: 3600000 # 1 hora en producción
  cors:
    allowed-origins: ${CORS_ORIGINS}

# Métricas limitadas en producción
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Configuración específica para producción
telconova:
  supportsuite:
    environment: produccion
    debug:
      enabled: false
      show-stack-traces: false