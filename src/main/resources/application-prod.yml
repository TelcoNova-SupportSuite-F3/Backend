# =====================================================
# CONFIGURACIÓN DE PRODUCCIÓN
# =====================================================

server:
  port: 8080
  tomcat:
    max-threads: 200
    min-spare-threads: 20

spring:
  # Base de datos de producción
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: telconova
        format_sql: false
        use_sql_comments: false
        generate_statistics: false
        jdbc:
          batch_size: 50

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration
    schemas: telconova
    table: schema_version

  # Configuración de archivos para producción
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Logging optimizado para producción
logging:
  level:
    root: WARN
    com.telconova: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: DEBUG
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: /var/log/telconova/supportsuite.log
    max-size: 100MB
    max-history: 30

# Seguridad reforzada para producción
security:
  jwt:
    secret-key: ${JWT_SECRET}
    expiration: 3600000 # 1 hora en producción
  cors:
    allowed-origins: ${CORS_ORIGINS}
    allowed-methods: ${ALLOWED_METHODS}}
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

# Métricas limitadas en producción
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Configuración específica para producción
telconova:
  supportsuite:
    environment: produccion
    debug:
      enabled: false
      show-stack-traces: false

# =====================================================
# CONFIGURACIÓN DE SWAGGER PARA PRODUCCIÓN
# =====================================================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    show-extensions: true
    show-common-extensions: true
    # CLAVE: Configurar el servidor de producción
    servers:
      - url: https://backendtelconova-production.up.railway.app
        description: Servidor de Producción
      - url: http://localhost:8080
        description: Servidor de Desarrollo
  packages-to-scan: com.telconova.supportsuite.infraestructura.adaptadores.entrada.web